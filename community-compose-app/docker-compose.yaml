services:

  # Generate scripts and configuration files
  generate-scripts:
    image: alpine:3.22.1
    entrypoint: ["/bin/sh", "-c"]
    restart: "no"
    user: root
    env_file:
      - .env
    command:
      - |
        set -e
        echo "Generating scripts..."
        echo "$${SETUP_SCRIPT}" > /scripts/setup.sh
        echo "$${UTILS_SCRIPT}" > /scripts/utils.sh
        echo "$${READY_CHECK_ENTRYPOINT}" > /scripts/entrypoint_ready_check.sh
        echo "$${CADDY_ENTRYPOINT}" > /scripts/entrypoint_caddy.sh
        echo "$${OPENVIDU_ENTRYPOINT}" > /scripts/entrypoint_openvidu.sh
        echo "$${OPENVIDU_MEET_ENTRYPOINT}" > /scripts/entrypoint_openvidu_meet.sh
        echo "$${OPENVIDU_CONFIG}" > /config/livekit.yaml
        echo "$${INGRESS_CONFIG}" > /config/ingress.yaml
        echo "$${EGRESS_CONFIG}" > /config/egress.yaml
        echo "Generating configuration files..."
        echo "Setting permissions..."
        chmod +x /scripts/setup.sh
        chmod +x /scripts/utils.sh
        chmod +x /scripts/entrypoint_ready_check.sh
        chmod +x /scripts/entrypoint_caddy.sh
        chmod +x /scripts/entrypoint_openvidu.sh
        chmod +x /scripts/entrypoint_openvidu_meet.sh
    environment:
      SETUP_SCRIPT: |
        #!/bin/sh
        echo "Setting up directories and permissions..."
        mkdir -p /minio/data
        mkdir -p /mongo/data
        mkdir -p /mongo/data/
        mkdir -p /egress/home/egress
        chown 1001:1001 /minio /minio/data
        chown 1001:1001 /mongo /mongo/data
        chown 1001:1001 /egress
        chown 1001:1001 /egress/home
        chown 1001:1001 /egress/home/egress
        echo "Setup complete."
      UTILS_SCRIPT: |
        #!/bin/sh
        LAN_DOMAIN=openvidu-local.dev
        if [ "$$LAN_PRIVATE_IP" != "" ]; then
            export USE_HTTPS=true
            export LAN_MODE=true
        else
            export USE_HTTPS=false
            export LAN_MODE=false
        fi
        echo "Using LAN_PRIVATE_IP: $${LAN_PRIVATE_IP:-none}"
        echo "Using USE_HTTPS: $${USE_HTTPS}"
        echo "Using LAN_MODE: $${LAN_MODE}"
        getDeploymentUrl() {
            schema="$${1:-http}"
            URL="$$schema://localhost:7880"
            if [ "$${USE_HTTPS}" = 'true' ]; then
                URL="$${schema}s://localhost:7443"
            fi
            if [ "$${LAN_MODE}" = 'true' ]; then
                LAN_DOMAIN=$${LAN_DOMAIN:-"openvidu-local.dev"}
                if [ "$$LAN_PRIVATE_IP" != 'none' ] && [ "$${LAN_DOMAIN}" = 'openvidu-local.dev' ]; then
                    # Replace dots with dashes
                    LAN_DOMAIN="$$(echo "$$LAN_PRIVATE_IP" | sed 's/\./-/g').openvidu-local.dev"
                fi
                URL="$${schema}s://$${LAN_DOMAIN}:7443"
            fi
            echo "$$URL"
        }
      READY_CHECK_ENTRYPOINT: |
        #!/bin/sh
        set -e
        export LAN_DOMAIN=openvidu-local.dev
        if [ "$$LAN_PRIVATE_IP" != "" ]; then
          export USE_HTTPS=true
          export LAN_MODE=true
        else
          export USE_HTTPS=false
          export LAN_MODE=false
        fi
        echo "Using LAN_PRIVATE_IP: $${LAN_PRIVATE_IP:-none}"
        echo "Using LAN_DOMAIN: $${LAN_DOMAIN}"
        echo "Using USE_HTTPS: $${USE_HTTPS}"
        echo "Using LAN_MODE: $${LAN_MODE}"
        /bin/operator
      CADDY_ENTRYPOINT: |
        #!/bin/sh
        set -e
        export LAN_DOMAIN=openvidu-local.dev
        if [ "$$LAN_PRIVATE_IP" != "" ]; then
          export USE_HTTPS=true
          export LAN_MODE=true
        else
          export USE_HTTPS=false
          export LAN_MODE=false
        fi
        echo "Using LAN_PRIVATE_IP: $${LAN_PRIVATE_IP:-none}"
        echo "Using LAN_DOMAIN: $${LAN_DOMAIN}"
        echo "Using USE_HTTPS: $${USE_HTTPS}"
        echo "Using LAN_MODE: $${LAN_MODE}"
        /entrypoint.sh /usr/bin/caddy run --config /config/caddy/Caddyfile
      OPENVIDU_ENTRYPOINT: |
        #!/bin/sh
        set -e
        if [ "$$LAN_PRIVATE_IP" != "" ]; then
            echo "Using as NODE_IP: $$LAN_PRIVATE_IP"
            export NODE_IP="$$LAN_PRIVATE_IP"
        fi
        ./livekit-server "$@"
      OPENVIDU_MEET_ENTRYPOINT: |
        #!/bin/bash
        . /scripts/utils.sh

        URL=$(getDeploymentUrl ws)
        export LIVEKIT_URL="$${URL}"

        /usr/local/bin/entrypoint.sh

      OPENVIDU_CONFIG: |
        # OpenVidu configuration
        openvidu:
            analytics:
                enabled: true
                interval: 10s
                expiration: 768h # 32 days
                mongo_url: mongodb://${MONGO_ADMIN_USERNAME:?mandatory}:${MONGO_ADMIN_PASSWORD:?mandatory}@mongo:27017/?replicaSet=rs0&readPreference=primaryPreferred

        # LiveKit configuration
        port: 7880
        bind_addresses:
            - ""
        rtc:
            tcp_port: 7881
            port_range_start: 7900
            port_range_end: 7999
        redis:
            address: redis:6379
            username: ""
            password: ${REDIS_PASSWORD:?mandatory}
            db: 0
            use_tls: false
        turn:
            enabled: true
            udp_port: 3478
            relay_range_start: 40000
            relay_range_end: 50000
        keys:
            ${LIVEKIT_API_KEY:?mandatory}: ${LIVEKIT_API_SECRET:?mandatory}
        webhook:
            api_key: ${LIVEKIT_API_KEY:?mandatory}
            urls:
                - http://host.docker.internal:6080/livekit/webhook
                - http://openvidu-meet:6080/livekit/webhook
        ingress:
            rtmp_base_url: rtmp://localhost:1935/rtmp
            whip_base_url: http://localhost:8085/whip
        logging:
            # Logging level for the LiveKit server.
            # Values: debug, info, warn, error.
            # Default: info.
            level: info

            # Logging level for the Pion WebRTC engine.
            # Values: trace, debug, info, warn, error.
            # Default: error.
            pion_level: warn
      INGRESS_CONFIG: |
        redis:
            address: redis:6379
            username: ""
            password: ${REDIS_PASSWORD:?mandatory}
            db: 0
            use_tls: false
        api_key: ${LIVEKIT_API_KEY:?mandatory}
        api_secret: ${LIVEKIT_API_SECRET:?mandatory}
        ws_url: ws://openvidu:7880
        rtmp_port: 1935
        whip_port: 8085
        http_relay_port: 9090
        health_port: 9091
        logging:
            json: false
            level: ""
        development: false
        rtc_config:
            udp_port: 7895
      EGRESS_CONFIG: |
        redis:
            address: redis:6379
            username: ""
            password: ${REDIS_PASSWORD:?mandatory}
            db: 0
            use_tls: false
        api_key: ${LIVEKIT_API_KEY:?mandatory}
        api_secret: ${LIVEKIT_API_SECRET:?mandatory}
        ws_url: ws://openvidu:7880
        health_port: 9091

        # Files will be moved here when uploads fail.
        backup:
            prefix: /home/egress/backup_storage

        # Storage for recordings.
        storage:
            s3:
                access_key: ${MINIO_ACCESS_KEY:?mandatory}
                secret: ${MINIO_SECRET_KEY:?mandatory}
                # Default region for minio
                region: us-east-1
                endpoint: http://minio:9000
                bucket: openvidu-appdata
                force_path_style: true
            #azure:
            #    account_name: your_account_name
            #    account_key: your_account_key
            #    container_name: openvidu-appdata

        # CPU cost for each type of Egress operation.
        cpu_cost:
            max_cpu_utilization: 0.80
            room_composite_cpu_cost: 0.01
            audio_room_composite_cpu_cost: 0.01
            web_cpu_cost: 0.01
            audio_web_cpu_cost: 0.01
            participant_cpu_cost: 0.01
            track_composite_cpu_cost: 0.01
            track_cpu_cost: 0.01
    volumes:
      - scripts:/scripts
      - config:/config

  setup:
    image: docker.io/busybox:1.37.0
    platform: linux/amd64
    container_name: setup
    restart: "no"
    volumes:
      - minio-data:/minio
      - mongo-data:/mongo
      - egress-data:/egress
      - scripts:/scripts/
    user: root
    depends_on:
      generate-scripts:
        condition: service_completed_successfully
    command: /bin/sh /scripts/setup.sh

  caddy-proxy:
    image: docker.io/openvidu/openvidu-caddy-local:main
    platform: linux/amd64
    container_name: caddy-proxy
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - LAN_PRIVATE_IP=${LAN_PRIVATE_IP:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - DASHBOARD_ADMIN_USERNAME=${DASHBOARD_ADMIN_USERNAME:-}
      - DASHBOARD_ADMIN_PASSWORD=${DASHBOARD_ADMIN_PASSWORD:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MEET_ADMIN_USER=${MEET_ADMIN_USER:-}
      - MEET_ADMIN_SECRET=${MEET_ADMIN_SECRET:-}
      - MEET_API_KEY=${MEET_API_KEY:-}
    volumes:
      - scripts:/scripts
    entrypoint: /bin/sh /scripts/entrypoint_caddy.sh
    ports:
      - 5443:5443
      - 6443:6443
      - 7443:7443
      - 7880:7880
      - 9443:9443
    depends_on:
      setup:
        condition: service_completed_successfully

  redis:
    image: docker.io/redis:7.4.4-alpine
    platform: linux/amd64
    container_name: redis
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis:/data
    command: >
      redis-server
      --bind 0.0.0.0
      --requirepass ${REDIS_PASSWORD:?mandatory}
    depends_on:
      setup:
        condition: service_completed_successfully

  minio:
    image: docker.io/bitnami/minio:2025.5.24-debian-12-r1
    platform: linux/amd64
    container_name: minio
    restart: unless-stopped
    ports:
      - 9000:9000
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:?mandatory}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:?mandatory}
      - MINIO_DEFAULT_BUCKETS=openvidu-appdata
      - MINIO_CONSOLE_SUBPATH=/minio-console
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:7880/minio-console
    volumes:
      - minio-data:/bitnami/minio/data
      - minio-certs:/certs
    depends_on:
      setup:
        condition: service_completed_successfully

  mongo:
    image: docker.io/bitnami/mongodb:8.0.9
    platform: linux/amd64
    container_name: mongo
    restart: unless-stopped
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/bitnami/mongodb
    environment:
      - MONGODB_ROOT_USER=${MONGO_ADMIN_USERNAME:?mandatory}
      - MONGODB_ROOT_PASSWORD=${MONGO_ADMIN_PASSWORD:?mandatory}
      - MONGODB_ADVERTISED_HOSTNAME=mongo
      - MONGODB_REPLICA_SET_MODE=primary
      - MONGODB_REPLICA_SET_NAME=rs0
      - MONGODB_REPLICA_SET_KEY=devreplicasetkey
      - EXPERIMENTAL_DOCKER_DESKTOP_FORCE_QEMU=1
    depends_on:
      setup:
        condition: service_completed_successfully

  dashboard:
    image: docker.io/openvidu/openvidu-dashboard:main
    platform: linux/amd64
    container_name: dashboard
    restart: unless-stopped
    environment:
      - SERVER_PORT=5000
      - ADMIN_USERNAME=${DASHBOARD_ADMIN_USERNAME:?mandatory}
      - ADMIN_PASSWORD=${DASHBOARD_ADMIN_PASSWORD:?mandatory}
      - DATABASE_URL=mongodb://${MONGO_ADMIN_USERNAME}:${MONGO_ADMIN_PASSWORD}@mongo:27017/?replicaSet=rs0&readPreference=primaryPreferred
    depends_on:
      setup:
        condition: service_completed_successfully

  openvidu:
    image: docker.io/openvidu/openvidu-server:main
    platform: linux/amd64
    restart: unless-stopped
    container_name: openvidu
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - LAN_PRIVATE_IP=${LAN_PRIVATE_IP:-}
    ports:
      - 3478:3478/udp
      - 7881:7881/tcp
      - 7900-7999:7900-7999/udp
    entrypoint: /bin/sh /scripts/entrypoint_openvidu.sh
    command: --config /config/livekit.yaml
    volumes:
      - scripts:/scripts
      - config:/config
    depends_on:
      setup:
        condition: service_completed_successfully

  ingress:
    image: docker.io/openvidu/ingress:main
    platform: linux/amd64
    container_name: ingress
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - 1935:1935
      - 8085:8085
      - 7895:7895/udp
    environment:
      - INGRESS_CONFIG_FILE=/config/ingress.yaml
    volumes:
      - config:/config
    depends_on:
      setup:
        condition: service_completed_successfully

  egress:
    image: docker.io/livekit/egress:v1.9.1
    platform: linux/amd64
    restart: unless-stopped
    container_name: egress
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - EGRESS_CONFIG_FILE=/config/egress.yaml
    volumes:
      - config:/config
      - egress-data:/home/egress/tmp
    depends_on:
      setup:
        condition: service_completed_successfully

  operator:
    image: docker.io/openvidu/openvidu-operator:main
    platform: linux/amd64
    container_name: operator
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agents-config:/agents-config
      - ./:/deployment
    environment:
      - PLATFORM=linux/amd64
      - MODE=agent-manager-local
      - DEPLOYMENT_FILES_DIR=/deployment
      - AGENTS_CONFIG_DIR=/agents-config
      - NETWORK_NAME=openvidu-community
      - AGENTS_CONFIG_VOLUME=openvidu-agents-config
      - LIVEKIT_URL=ws://openvidu:7880/
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:?mandatory}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:?mandatory}
      - REDIS_ADDRESS=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?mandatory}
    depends_on:
      setup:
        condition: service_completed_successfully

  openvidu-meet:
    image: docker.io/openvidu/openvidu-meet:main
    platform: linux/amd64
    container_name: openvidu-meet
    restart: on-failure
    ports:
      - 9080:6080
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - LAN_PRIVATE_IP=${LAN_PRIVATE_IP:-}
      - SERVER_PORT=6080
      - MEET_LOG_LEVEL=${MEET_LOG_LEVEL:-info}
      - MEET_NAME_ID=openviduMeet-LOCAL
      - MEET_API_KEY=${MEET_API_KEY:-meet-api-key}
      - MEET_ADMIN_USER=${MEET_ADMIN_USER:-admin}
      - MEET_ADMIN_SECRET=${MEET_ADMIN_SECRET:-admin}
      - MEET_COOKIE_SECURE=false
      - MEET_WEBHOOK_ENABLED=true
      - MEET_WEBHOOK_URL=${MEET_WEBHOOK_URL:-http://host.docker.internal:5080/webhook}
      - LIVEKIT_URL_PRIVATE=ws://openvidu:7880/
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - MEET_S3_BUCKET=${MEET_S3_BUCKET:-openvidu-appdata}
      - MEET_S3_SUBBUCKET=${MEET_S3_SUBBUCKET:-openvidu-meet}
      - MEET_S3_SERVICE_ENDPOINT=${MEET_S3_SERVICE_ENDPOINT:-http://minio:9000}
      - MEET_S3_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MEET_S3_SECRET_KEY=${MINIO_SECRET_KEY}
      - MEET_AWS_REGION=${MEET_AWS_REGION:-us-east-1}
      - MEET_S3_WITH_PATH_STYLE_ACCESS=${MEET_S3_WITH_PATH_STYLE_ACCESS:-true}
      - MEET_REDIS_HOST=redis
      - MEET_REDIS_PORT=6379
      - MEET_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MEET_REDIS_DB=0
    volumes:
      - scripts:/scripts
    entrypoint: /bin/sh /scripts/entrypoint_openvidu_meet.sh
    depends_on:
      setup:
        condition: service_completed_successfully

  ready-check:
    image: docker.io/openvidu/openvidu-operator:main
    platform: linux/amd64
    container_name: ready-check
    restart: on-failure
    environment:
      - MODE=local-ready-check
      - DASHBOARD_ADMIN_USERNAME=${DASHBOARD_ADMIN_USERNAME:-}
      - DASHBOARD_ADMIN_PASSWORD=${DASHBOARD_ADMIN_PASSWORD:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-}
      - MEET_ADMIN_USER=${MEET_ADMIN_USER:-}
      - MEET_ADMIN_SECRET=${MEET_ADMIN_SECRET:-}
      - MEET_API_KEY=${MEET_API_KEY:-}
    volumes:
      - scripts:/scripts
    entrypoint: /bin/sh /scripts/entrypoint_ready_check.sh
    depends_on:
      - openvidu
      - ingress
      - egress
      - dashboard
      - minio
      - mongo

volumes:
  scripts:
    name: openvidu-scripts
  config:
    name: openvidu-config
  agents-config:
    name: openvidu-agents-config
  minio-certs:
    name: openvidu-minio-certs
  mongodb-config:
    name: openvidu-mongodb-config
  redis:
    name: openvidu-redis
  minio-data:
    name: openvidu-minio-data
  mongo-data:
    name: openvidu-mongo-data
  egress-data:
    name: openvidu-egress-data